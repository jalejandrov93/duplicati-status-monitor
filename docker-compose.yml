services:
  duplicati-monitor:
    image: ghcr.io/jalejandrov93/backup-duplicati:master
    container_name: duplicati-backup-monitor
    ports:
      - "8191:3000"
    environment:
      # MongoDB Atlas URI (configurar en .env)
      - MONGODB_URI=${MONGODB_URI}
      # Opcionales
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - duplicati-network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/stats', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  duplicati-network:
    driver: bridge
