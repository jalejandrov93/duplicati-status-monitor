version: '3.8'

services:
  duplicati-monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: duplicati-backup-monitor
    ports:
      - "8187:3000"
    environment:
      # MongoDB Atlas URI (configurar en .env)
      - MONGODB_URI=${MONGODB_URI}
      # Opcionales
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - duplicati-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/stats', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  duplicati-network:
    driver: bridge
